
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
#error_log  /var/log/nginx/error.log error;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"'
                      '"$http_authorization"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush     on;
    tcp_nodelay  on;
    types_hash_max_size 2048;
    keepalive_timeout  65;
    chunked_transfer_encoding off;

    # Don't expose Nginx version
    server_tokens off;

    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN";

    # Mitigate Cross-Site scripting attack
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";
    # Enable gzip encryption
    gzip  on;
    gzip_static on;
    gzip_comp_level 5;
    #client_max_body_size 10M;
    #proxy_request_buffering off;
    proxy_http_version 1.1;
    
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=cache:30m max_size=250m inactive=60m use_temp_path=off;
    proxy_temp_path /tmp/nginx_proxy 1 2;

    # Set timeouts for upstream to avoid long waits
    proxy_connect_timeout 100s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Retry on upstream errors
    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;

    # ---------------------------------------------------------------------------
    # CORS policy maps — must be defined before conf.d/ is included
    #
    # Two things grant credential-compatible CORS (specific origin echo + credentials):
    #   1. Origin is in the explicit whitelist below
    #   2. Request carries an Authorization header (API key / Bearer token)
    #
    # Everyone else gets Access-Control-Allow-Origin: * (public data, no credentials).
    # To add a trusted origin: append a line to $origin_whitelisted below.
    # ---------------------------------------------------------------------------
    map $http_origin $origin_whitelisted {
        default                                                 0;
        "~^https?://dataportal\.material-digital\.de$"         1;
        "~^https?://docker-dev\.iwm\.fraunhofer\.de(:\d+)?$"  1;
    }

    map $http_authorization $has_authorization {
        default  0;
        "~^.+"   1;
    }

    map "$has_authorization$origin_whitelisted" $cors_origin {
        default  "*";
        "~1"     $http_origin;
    }

    map "$has_authorization$origin_whitelisted" $cors_credentials {
        default  "";
        "~1"     "true";
    }

    include /etc/nginx/conf.d/*.conf;

    #anonymize IPs
    map $remote_addr $ip_anonym1 {
    default 0.0.0;
    "~(?P<ip>(\d+)\.(\d+)\.(\d+))\.\d+" $ip;
    "~(?P<ip>[^:]+:[^:]+):" $ip;
    }

    map $remote_addr $ip_anonym2 {
    default .0;
    "~(?P<ip>(\d+)\.(\d+)\.(\d+))\.\d+" .0;
    "~(?P<ip>[^:]+:[^:]+):" ::;
    }

    map $ip_anonym1$ip_anonym2 $ip_anonymized {
    default 0.0.0.0;
    "~(?P<ip>.*)" $ip;
    }

    log_format anonymized '$ip_anonymized - $remote_user [$time_local] ' 
      '"$request" $status $body_bytes_sent ' 
      '"$http_referer" "$http_user_agent"';
      
    # Error status text
    map $status $status_text {
      400 'Bad Request';
      401 'Unauthorized';
      402 'Payment Required';
      403 'Forbidden';
      404 'Not Found';
      405 'Method Not Allowed';
      406 'Not Acceptable';
      407 'Proxy Authentication Required';
      408 'Request Timeout';
      409 'Conflict';
      410 'Gone';
      411 'Length Required';
      412 'Precondition Failed';
      413 'Payload Too Large';
      414 'URI Too Long';
      415 'Unsupported Media Type';
      416 'Range Not Satisfiable';
      417 'Expectation Failed';
      418 'I\'m a teapot';
      421 'Misdirected Request';
      422 'Unprocessable Entity';
      423 'Locked';
      424 'Failed Dependency';
      425 'Too Early';
      426 'Upgrade Required';
      428 'Precondition Required';
      429 'Too Many Requests';
      431 'Request Header Fields Too Large';
      451 'Unavailable For Legal Reasons';
      500 'Internal Server Error';
      501 'Not Implemented';
      502 'Bad Gateway';
      503 'Service Unavailable';
      504 'Gateway Timeout';
      505 'HTTP Version Not Supported';
      506 'Variant Also Negotiates';
      507 'Insufficient Storage';
      508 'Loop Detected';
      510 'Not Extended';
      511 'Network Authentication Required';
      default 'Something is wrong';
    }
}
