# Development overrides — only the differences from compose.yaml.
# Usage: docker compose -f compose.yaml -f compose.dev.yaml up -d
# Volumes and networks are inherited from compose.yaml.
services:
  ckan:
    image: ckan-dev
    user: 0:0
    build:
      context: ckan-docker/ckan/
      dockerfile: ../../config/ckan/Dockerfile.dev
      args:
        - TZ=${TZ}
    environment:
      - DEBUG=true
    volumes:
      - ./config/ckan/entrypoint_wrapper.sh:/srv/app/entrypoint_wrapper.sh
      - ./ckan_plugins:/srv/app/src_extensions
    entrypoint: /srv/app/entrypoint_wrapper.sh
